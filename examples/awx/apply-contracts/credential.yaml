apiVersion: agentprovider/v1
kind: Resource
type: credential

connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}

identity:
  attribute: id
  known_after: create

schema:
  attributes:
    id:
      type: string
      computed: true
    name:
      type: string
      required: true
    description:
      type: string
      optional: true
      default: ""
    organization:
      type: number
      optional: true
    credential_type:
      type: number
      required: true
    inputs:
      type: string
      computed: true
    managed:
      type: bool
      computed: true
    kind:
      type: string
      computed: true
    cloud:
      type: bool
      computed: true
    kubernetes:
      type: bool
      computed: true

lifecycle:
  create:
    method: POST
    path: /api/v2/credentials/
    body:
      - name
      - description
      - organization
      - credential_type
    expect_status:
      - 201
  read:
    method: GET
    path: "/api/v2/credentials/${id}/"
    expect_status:
      - 200
    not_found_status:
      - 404
  update:
    method: PATCH
    path: "/api/v2/credentials/${id}/"
    body:
      - name
      - description
      - organization
      - credential_type
    expect_status:
      - 200
  delete:
    method: DELETE
    path: "/api/v2/credentials/${id}/"
    expect_status:
      - 204
    not_found_status:
      - 404

ignore_server_fields:
  - url
  - type
  - related
  - summary_fields
  - created
  - modified
  - detail

conformance:
  example:
    name: ap-cred-test
    description: "test credential"
    organization: 138
    credential_type: 1
  update_to:
    name: ap-cred-test-updated
    description: "updated test credential"
    organization: 138
    credential_type: 1
  invariants:
    - id_is_computed_and_nonempty
    - create_echoes_inputs
    - read_matches_create
    - update_then_read_reflects
    - second_apply_is_noop
    - delete_then_read_404
    - import_reconstructs
    - id_stable_across_update
