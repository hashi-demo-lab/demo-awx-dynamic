apiVersion: agentprovider/v1
kind: Resource
type: organization

connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}

identity:
  attribute: id
  known_after: create
  response_field: id

lifecycle:
  create:
    method: POST
    path: /api/v2/organizations/
    body:
      - name
      - description
      - max_hosts
      - default_environment
    expect_status:
      - 201
  read:
    method: GET
    path: "/api/v2/organizations/${id}/"
    expect_status:
      - 200
    not_found_status:
      - 404
  update:
    method: PATCH
    path: "/api/v2/organizations/${id}/"
    body:
      - name
      - description
      - max_hosts
      - default_environment
    expect_status:
      - 200
    refresh_after: true
  delete:
    method: DELETE
    path: "/api/v2/organizations/${id}/"
    expect_status:
      - 204
    not_found_status:
      - 404

schema:
  attributes:
    id:
      computed: true
      type: number
    name:
      required: true
      type: string
    description:
      optional: true
      default: ""
      type: string
    max_hosts:
      optional: true
      default: 0
      type: number
    default_environment:
      optional: true
      computed: true
      type: number

ignore_server_fields:
  - type
  - url
  - related
  - summary_fields
  - created
  - modified
  - custom_virtualenv
  - detail

conformance:
  example:
    name: "ap-org-conform-test"
    description: "test organization"
    max_hosts: 0
    default_environment: null
  update_to:
    name: "ap-org-conform-test"
    description: "updated description"
    max_hosts: 10
    default_environment: null
  invariants:
    - id_is_computed_and_nonempty
    - create_echoes_inputs
    - read_matches_create
    - update_then_read_reflects
    - second_apply_is_noop
    - delete_then_read_404
    - import_reconstructs
    - id_stable_across_update
