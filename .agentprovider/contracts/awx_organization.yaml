apiVersion: agentprovider/v1
type: awx_organization
kind: Resource

connection:
    base_url: ${env.AWX}
    allow_insecure: true
    allow_private_host: true
    headers:
        Content-Type: application/json
    auth:
        type: basic
        username: ${env.AWX_USERNAME}
        password: ${env.AWX_PASSWORD}

identity:
    attribute: id
    known_after: create
    response_field: id

schema:
    attributes:
        id:
            computed: true
            type: string
        name:
            required: true
            type: string
        description:
            optional: true
            default: ""
            type: string
        max_hosts:
            optional: true
            default: 0
            type: number
        default_environment:
            optional: true
            type: number

ignore_server_fields:
    - related
    - summary_fields
    - type
    - url
    - created
    - modified
    - custom_virtualenv
    - detail

lifecycle:
    create:
        method: POST
        path: /api/v2/organizations/
        expect_status: [201]
        body:
            - name
            - description
            - max_hosts
            - default_environment
    read:
        method: GET
        path: "/api/v2/organizations/${id}/"
        expect_status: [200]
        not_found_status: [404]
    update:
        method: PATCH
        path: "/api/v2/organizations/${id}/"
        expect_status: [200]
        body:
            - name
            - description
            - max_hosts
            - default_environment
        refresh_after: true
    delete:
        method: DELETE
        path: "/api/v2/organizations/${id}/"
        expect_status: [204]
        not_found_status: [404]

conformance:
    example:
        name: apeval-fresh-org-a7k3
        description: "Eval org for agentprovider testing"
        max_hosts: 0
        default_environment: null
    update_to:
        name: apeval-fresh-org-a7k3
        description: "Updated description for agentprovider eval"
        max_hosts: 0
        default_environment: null
    invariants:
        - id_is_computed_and_nonempty
        - create_echoes_inputs
        - optional_default_consistency
        - read_matches_create
        - update_then_read_reflects
        - second_apply_is_noop
        - delete_then_read_404
        - state_matches_expect
        - import_reconstructs
        - id_stable_across_update
    expect:
        id:
            not_null: true
