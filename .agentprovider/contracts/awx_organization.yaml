apiVersion: agentprovider/v1
kind: Resource
type: awx_organization
connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  headers:
    Accept: application/json
    Content-Type: application/json
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}
    failure_status: [401, 403]
schema:
  attributes:
    id:
      type: string
      computed: true
    name:
      type: string
      required: true
    description:
      type: string
      optional: true
      computed: true
    max_hosts:
      type: number
      optional: true
      computed: true
    default_environment:
      type: number
      optional: true
identity:
  attribute: id
  known_after: create
ignore_server_fields:
  - type
  - url
  - related
  - summary_fields
  - created
  - modified
  - custom_virtualenv
  - detail
lifecycle:
  create:
    method: POST
    path: /api/v2/organizations/
    body: [name, description, max_hosts, default_environment]
    expect_status: [201]
  read:
    method: GET
    path: /api/v2/organizations/${id}/
    expect_status: [200]
    not_found_status: [404]
  update:
    method: PATCH
    path: /api/v2/organizations/${id}/
    body: [name, description, max_hosts, default_environment]
    expect_status: [200]
    refresh_after: true
  delete:
    method: DELETE
    path: /api/v2/organizations/${id}/
    expect_status: [202, 204]
    not_found_status: [404]
conformance:
  example:
    name: apeval-r10-org
    description: agentprovider eval r10 organization
    max_hosts: 0
    default_environment: null
  update_to:
    name: apeval-r10-org
    description: agentprovider eval r10 organization updated
    max_hosts: 5
    default_environment: null
  expect:
    id: { not_null: true }
  invariants:
    - id_is_computed_and_nonempty
    - create_echoes_inputs
    - optional_default_consistency
    - read_matches_create
    - update_then_read_reflects
    - second_apply_is_noop
    - delete_then_read_404
    - state_matches_expect
    - import_reconstructs
    - id_stable_across_update
