apiVersion: agentprovider/v1
type: awx_job_template
kind: Resource

connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  headers:
    Content-Type: application/json
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}

identity:
  attribute: id
  known_after: create
  response_field: id

ignore_server_fields:
  - type
  - url
  - related
  - summary_fields
  - created
  - modified
  - last_job_run
  - last_job_failed
  - next_job_run
  - status
  - organization
  - custom_virtualenv
  - detail

schema:
  attributes:
    id:
      computed: true
      type: string
    name:
      required: true
      type: string
    description:
      optional: true
      default: ""
      type: string
    job_type:
      optional: true
      default: "run"
      type: string
    inventory:
      optional: true
      type: number
    project:
      optional: true
      type: number
    playbook:
      optional: true
      default: ""
      type: string
    scm_branch:
      optional: true
      default: ""
      type: string
    forks:
      optional: true
      default: 0
      type: number
    limit:
      optional: true
      default: ""
      type: string
    verbosity:
      optional: true
      default: 0
      type: number
    extra_vars:
      optional: true
      default: ""
      type: string
    job_tags:
      optional: true
      default: ""
      type: string
    force_handlers:
      optional: true
      default: false
      type: bool
    skip_tags:
      optional: true
      default: ""
      type: string
    start_at_task:
      optional: true
      default: ""
      type: string
    timeout:
      optional: true
      default: 0
      type: number
    use_fact_cache:
      optional: true
      default: false
      type: bool
    host_config_key:
      optional: true
      default: ""
      type: string
    ask_scm_branch_on_launch:
      optional: true
      default: false
      type: bool
    ask_diff_mode_on_launch:
      optional: true
      default: false
      type: bool
    ask_variables_on_launch:
      optional: true
      default: false
      type: bool
    ask_limit_on_launch:
      optional: true
      default: false
      type: bool
    ask_tags_on_launch:
      optional: true
      default: false
      type: bool
    ask_skip_tags_on_launch:
      optional: true
      default: false
      type: bool
    ask_job_type_on_launch:
      optional: true
      default: false
      type: bool
    ask_verbosity_on_launch:
      optional: true
      default: false
      type: bool
    ask_inventory_on_launch:
      optional: true
      default: false
      type: bool
    ask_credential_on_launch:
      optional: true
      default: false
      type: bool
    ask_execution_environment_on_launch:
      optional: true
      default: false
      type: bool
    ask_labels_on_launch:
      optional: true
      default: false
      type: bool
    ask_forks_on_launch:
      optional: true
      default: false
      type: bool
    ask_job_slice_count_on_launch:
      optional: true
      default: false
      type: bool
    ask_timeout_on_launch:
      optional: true
      default: false
      type: bool
    ask_instance_groups_on_launch:
      optional: true
      default: false
      type: bool
    survey_enabled:
      optional: true
      default: false
      type: bool
    become_enabled:
      optional: true
      default: false
      type: bool
    diff_mode:
      optional: true
      default: false
      type: bool
    allow_simultaneous:
      optional: true
      default: false
      type: bool
    job_slice_count:
      optional: true
      default: 1
      type: number
    webhook_service:
      optional: true
      computed: true
      type: string
    webhook_credential:
      optional: true
      type: number
    execution_environment:
      optional: true
      type: number
    prevent_instance_group_fallback:
      optional: true
      default: false
      type: bool

lifecycle:
  create:
    method: POST
    path: /api/v2/job_templates/
    expect_status: [201]
    body:
      - name
      - description
      - job_type
      - inventory
      - project
      - playbook
      - scm_branch
      - forks
      - limit
      - verbosity
      - extra_vars
      - job_tags
      - force_handlers
      - skip_tags
      - start_at_task
      - timeout
      - use_fact_cache
      - host_config_key
      - ask_scm_branch_on_launch
      - ask_diff_mode_on_launch
      - ask_variables_on_launch
      - ask_limit_on_launch
      - ask_tags_on_launch
      - ask_skip_tags_on_launch
      - ask_job_type_on_launch
      - ask_verbosity_on_launch
      - ask_inventory_on_launch
      - ask_credential_on_launch
      - ask_execution_environment_on_launch
      - ask_labels_on_launch
      - ask_forks_on_launch
      - ask_job_slice_count_on_launch
      - ask_timeout_on_launch
      - ask_instance_groups_on_launch
      - survey_enabled
      - become_enabled
      - diff_mode
      - allow_simultaneous
      - job_slice_count
      - webhook_service
      - webhook_credential
      - execution_environment
      - prevent_instance_group_fallback

  read:
    method: GET
    path: "/api/v2/job_templates/${id}/"
    expect_status: [200]
    not_found_status: [404]

  update:
    method: PATCH
    path: "/api/v2/job_templates/${id}/"
    expect_status: [200]
    refresh_after: true
    body:
      - name
      - description
      - job_type
      - inventory
      - project
      - playbook
      - scm_branch
      - forks
      - limit
      - verbosity
      - extra_vars
      - job_tags
      - force_handlers
      - skip_tags
      - start_at_task
      - timeout
      - use_fact_cache
      - host_config_key
      - ask_scm_branch_on_launch
      - ask_diff_mode_on_launch
      - ask_variables_on_launch
      - ask_limit_on_launch
      - ask_tags_on_launch
      - ask_skip_tags_on_launch
      - ask_job_type_on_launch
      - ask_verbosity_on_launch
      - ask_inventory_on_launch
      - ask_credential_on_launch
      - ask_execution_environment_on_launch
      - ask_labels_on_launch
      - ask_forks_on_launch
      - ask_job_slice_count_on_launch
      - ask_timeout_on_launch
      - ask_instance_groups_on_launch
      - survey_enabled
      - become_enabled
      - diff_mode
      - allow_simultaneous
      - job_slice_count
      - webhook_service
      - webhook_credential
      - execution_environment
      - prevent_instance_group_fallback

  delete:
    method: DELETE
    path: "/api/v2/job_templates/${id}/"
    expect_status: [204]
    not_found_status: [404]

conformance:
  example:
    name: "apeval-fresh-jt-a7f3"
    job_type: "run"
    inventory: 154
    project: 6
    playbook: "hello_world.yml"
    description: ""
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    use_fact_cache: false
    host_config_key: ""
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_variables_on_launch: false
    ask_limit_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_inventory_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    survey_enabled: false
    become_enabled: false
    diff_mode: false
    allow_simultaneous: false
    job_slice_count: 1
    webhook_service: ""
    prevent_instance_group_fallback: false

  update_to:
    name: "apeval-fresh-jt-a7f3"
    job_type: "run"
    inventory: 154
    project: 6
    playbook: "hello_world.yml"
    description: "updated description"
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    use_fact_cache: false
    host_config_key: ""
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_variables_on_launch: false
    ask_limit_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_inventory_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    survey_enabled: false
    become_enabled: false
    diff_mode: false
    allow_simultaneous: false
    job_slice_count: 1
    webhook_service: ""
    webhook_credential: null
    execution_environment: null
    prevent_instance_group_fallback: false

  expect:
    id:
      not_null: true

  invariants:
    - id_is_computed_and_nonempty
    - create_echoes_inputs
    - optional_default_consistency
    - read_matches_create
    - update_then_read_reflects
    - second_apply_is_noop
    - delete_then_read_404
    - state_matches_expect
    - import_reconstructs
    - id_stable_across_update
