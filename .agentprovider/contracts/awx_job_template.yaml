apiVersion: agentprovider/v1
kind: Resource
type: awx_job_template
connection:
    base_url: ${env.AWX}
    allow_insecure: true
    allow_private_host: true
    headers:
        Content-Type: application/json
        Accept: application/json
    auth:
        type: basic
        username: ${env.AWX_USERNAME}
        password: ${env.AWX_PASSWORD}
        failure_status: [401, 403]
identity:
    attribute: id
    known_after: create
    response_field: id
schema:
    attributes:
        id: { computed: true, type: string }
        name: { required: true, type: string }
        description: { optional: true, computed: true, type: string }
        job_type: { optional: true, computed: true, type: string }
        inventory: { optional: true, type: number }
        project: { optional: true, type: number }
        playbook: { optional: true, computed: true, type: string }
        scm_branch: { optional: true, computed: true, type: string }
        forks: { optional: true, computed: true, type: number }
        limit: { optional: true, computed: true, type: string }
        verbosity: { optional: true, computed: true, type: number }
        extra_vars: { optional: true, computed: true, type: string }
        job_tags: { optional: true, computed: true, type: string }
        force_handlers: { optional: true, computed: true, type: bool }
        skip_tags: { optional: true, computed: true, type: string }
        start_at_task: { optional: true, computed: true, type: string }
        timeout: { optional: true, computed: true, type: number }
        use_fact_cache: { optional: true, computed: true, type: bool }
        host_config_key: { optional: true, computed: true, type: string }
        survey_enabled: { optional: true, computed: true, type: bool }
        become_enabled: { optional: true, computed: true, type: bool }
        diff_mode: { optional: true, computed: true, type: bool }
        allow_simultaneous: { optional: true, computed: true, type: bool }
        job_slice_count: { optional: true, computed: true, type: number }
        ask_scm_branch_on_launch: { optional: true, computed: true, type: bool }
        ask_diff_mode_on_launch: { optional: true, computed: true, type: bool }
        ask_variables_on_launch: { optional: true, computed: true, type: bool }
        ask_limit_on_launch: { optional: true, computed: true, type: bool }
        ask_tags_on_launch: { optional: true, computed: true, type: bool }
        ask_skip_tags_on_launch: { optional: true, computed: true, type: bool }
        ask_job_type_on_launch: { optional: true, computed: true, type: bool }
        ask_verbosity_on_launch: { optional: true, computed: true, type: bool }
        ask_inventory_on_launch: { optional: true, computed: true, type: bool }
        ask_credential_on_launch: { optional: true, computed: true, type: bool }
        ask_execution_environment_on_launch: { optional: true, computed: true, type: bool }
        ask_labels_on_launch: { optional: true, computed: true, type: bool }
        ask_forks_on_launch: { optional: true, computed: true, type: bool }
        ask_job_slice_count_on_launch: { optional: true, computed: true, type: bool }
        ask_timeout_on_launch: { optional: true, computed: true, type: bool }
        ask_instance_groups_on_launch: { optional: true, computed: true, type: bool }
lifecycle:
    create:
        method: POST
        path: /api/v2/job_templates/
        body: [name, description, job_type, inventory, project, playbook, scm_branch, forks, limit, verbosity, extra_vars, job_tags, force_handlers, skip_tags, start_at_task, timeout, use_fact_cache, host_config_key, survey_enabled, become_enabled, diff_mode, allow_simultaneous, job_slice_count, ask_scm_branch_on_launch, ask_diff_mode_on_launch, ask_variables_on_launch, ask_limit_on_launch, ask_tags_on_launch, ask_skip_tags_on_launch, ask_job_type_on_launch, ask_verbosity_on_launch, ask_inventory_on_launch, ask_credential_on_launch, ask_execution_environment_on_launch, ask_labels_on_launch, ask_forks_on_launch, ask_job_slice_count_on_launch, ask_timeout_on_launch, ask_instance_groups_on_launch]
        expect_status: [200, 201]
    read:
        method: GET
        path: /api/v2/job_templates/${id}/
        expect_status: [200]
        not_found_status: [404]
    update:
        method: PATCH
        path: /api/v2/job_templates/${id}/
        body: [name, description, job_type, inventory, project, playbook, scm_branch, forks, limit, verbosity, extra_vars, job_tags, force_handlers, skip_tags, start_at_task, timeout, use_fact_cache, host_config_key, survey_enabled, become_enabled, diff_mode, allow_simultaneous, job_slice_count, ask_scm_branch_on_launch, ask_diff_mode_on_launch, ask_variables_on_launch, ask_limit_on_launch, ask_tags_on_launch, ask_skip_tags_on_launch, ask_job_type_on_launch, ask_verbosity_on_launch, ask_inventory_on_launch, ask_credential_on_launch, ask_execution_environment_on_launch, ask_labels_on_launch, ask_forks_on_launch, ask_job_slice_count_on_launch, ask_timeout_on_launch, ask_instance_groups_on_launch]
        expect_status: [200]
        refresh_after: true
    delete:
        method: DELETE
        path: /api/v2/job_templates/${id}/
        expect_status: [200, 202, 204]
        not_found_status: [404]
ignore_server_fields:
    - type
    - url
    - related
    - summary_fields
    - created
    - modified
    - organization
    - last_job_run
    - last_job_failed
    - next_job_run
    - status
    - execution_environment
    - custom_virtualenv
    - webhook_service
    - webhook_credential
    - prevent_instance_group_fallback
    - detail
conformance:
    example:
        name: apeval-r11-jt
        description: agentprovider eval r11 job template
        job_type: run
        inventory: 117
        project: 6
        playbook: hello_world.yml
        scm_branch: ""
        forks: 0
        limit: ""
        verbosity: 0
        extra_vars: ""
        job_tags: ""
        force_handlers: false
        skip_tags: ""
        start_at_task: ""
        timeout: 0
        use_fact_cache: false
        host_config_key: ""
        survey_enabled: false
        become_enabled: false
        diff_mode: false
        allow_simultaneous: false
        job_slice_count: 1
        ask_scm_branch_on_launch: false
        ask_diff_mode_on_launch: false
        ask_variables_on_launch: false
        ask_limit_on_launch: false
        ask_tags_on_launch: false
        ask_skip_tags_on_launch: false
        ask_job_type_on_launch: false
        ask_verbosity_on_launch: false
        ask_inventory_on_launch: false
        ask_credential_on_launch: false
        ask_execution_environment_on_launch: false
        ask_labels_on_launch: false
        ask_forks_on_launch: false
        ask_job_slice_count_on_launch: false
        ask_timeout_on_launch: false
        ask_instance_groups_on_launch: false
    update_to:
        name: apeval-r11-jt
        description: agentprovider eval r11 job template updated
        job_type: run
        inventory: 117
        project: 6
        playbook: hello_world.yml
        scm_branch: ""
        forks: 0
        limit: ""
        verbosity: 1
        extra_vars: ""
        job_tags: ""
        force_handlers: false
        skip_tags: ""
        start_at_task: ""
        timeout: 0
        use_fact_cache: false
        host_config_key: ""
        survey_enabled: false
        become_enabled: false
        diff_mode: false
        allow_simultaneous: false
        job_slice_count: 1
        ask_scm_branch_on_launch: false
        ask_diff_mode_on_launch: false
        ask_variables_on_launch: false
        ask_limit_on_launch: false
        ask_tags_on_launch: false
        ask_skip_tags_on_launch: false
        ask_job_type_on_launch: false
        ask_verbosity_on_launch: false
        ask_inventory_on_launch: false
        ask_credential_on_launch: false
        ask_execution_environment_on_launch: false
        ask_labels_on_launch: false
        ask_forks_on_launch: false
        ask_job_slice_count_on_launch: false
        ask_timeout_on_launch: false
        ask_instance_groups_on_launch: false
    expect:
        id: { not_null: true }
    invariants:
        - id_is_computed_and_nonempty
        - create_echoes_inputs
        - optional_default_consistency
        - read_matches_create
        - update_then_read_reflects
        - second_apply_is_noop
        - delete_then_read_404
        - state_matches_expect
        - import_reconstructs
        - id_stable_across_update
