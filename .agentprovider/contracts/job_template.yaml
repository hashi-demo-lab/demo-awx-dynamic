apiVersion: agentprovider/v1
type: job_template
kind: Resource

connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}

identity:
  attribute: id
  known_after: create
  response_field: id

lifecycle:
  create:
    method: POST
    path: /api/v2/job_templates/
    expect_status: [201]
    body:
      - name
      - description
      - job_type
      - inventory
      - project
      - playbook
      - scm_branch
      - forks
      - limit
      - verbosity
      - extra_vars
      - job_tags
      - force_handlers
      - skip_tags
      - start_at_task
      - timeout
      - use_fact_cache
      - host_config_key
      - ask_scm_branch_on_launch
      - ask_diff_mode_on_launch
      - ask_variables_on_launch
      - ask_limit_on_launch
      - ask_tags_on_launch
      - ask_skip_tags_on_launch
      - ask_job_type_on_launch
      - ask_verbosity_on_launch
      - ask_inventory_on_launch
      - ask_credential_on_launch
      - ask_execution_environment_on_launch
      - ask_labels_on_launch
      - ask_forks_on_launch
      - ask_job_slice_count_on_launch
      - ask_timeout_on_launch
      - ask_instance_groups_on_launch
      - survey_enabled
      - become_enabled
      - diff_mode
      - allow_simultaneous
      - job_slice_count
      - webhook_service
      - prevent_instance_group_fallback
  read:
    method: GET
    path: "/api/v2/job_templates/${id}/"
    expect_status: [200]
    not_found_status: [404]
  update:
    method: PATCH
    path: "/api/v2/job_templates/${id}/"
    expect_status: [200]
    body:
      - name
      - description
      - job_type
      - inventory
      - project
      - playbook
      - scm_branch
      - forks
      - limit
      - verbosity
      - extra_vars
      - job_tags
      - force_handlers
      - skip_tags
      - start_at_task
      - timeout
      - use_fact_cache
      - host_config_key
      - ask_scm_branch_on_launch
      - ask_diff_mode_on_launch
      - ask_variables_on_launch
      - ask_limit_on_launch
      - ask_tags_on_launch
      - ask_skip_tags_on_launch
      - ask_job_type_on_launch
      - ask_verbosity_on_launch
      - ask_inventory_on_launch
      - ask_credential_on_launch
      - ask_execution_environment_on_launch
      - ask_labels_on_launch
      - ask_forks_on_launch
      - ask_job_slice_count_on_launch
      - ask_timeout_on_launch
      - ask_instance_groups_on_launch
      - survey_enabled
      - become_enabled
      - diff_mode
      - allow_simultaneous
      - job_slice_count
      - webhook_service
      - prevent_instance_group_fallback
  delete:
    method: DELETE
    path: "/api/v2/job_templates/${id}/"
    expect_status: [204]
    not_found_status: [404]

schema:
  attributes:
    id:
      type: string
      computed: true
    name:
      type: string
      required: true
    description:
      type: string
      optional: true
      default: ""
    job_type:
      type: string
      optional: true
      default: "run"
    inventory:
      type: number
      optional: true
    project:
      type: number
      optional: true
    playbook:
      type: string
      optional: true
      default: ""
    scm_branch:
      type: string
      optional: true
      default: ""
    forks:
      type: number
      optional: true
      default: 0
    limit:
      type: string
      optional: true
      default: ""
    verbosity:
      type: number
      optional: true
      default: 0
    extra_vars:
      type: string
      optional: true
      default: ""
    job_tags:
      type: string
      optional: true
      default: ""
    force_handlers:
      type: bool
      optional: true
      default: false
    skip_tags:
      type: string
      optional: true
      default: ""
    start_at_task:
      type: string
      optional: true
      default: ""
    timeout:
      type: number
      optional: true
      default: 0
    use_fact_cache:
      type: bool
      optional: true
      default: false
    host_config_key:
      type: string
      optional: true
      default: ""
    ask_scm_branch_on_launch:
      type: bool
      optional: true
      default: false
    ask_diff_mode_on_launch:
      type: bool
      optional: true
      default: false
    ask_variables_on_launch:
      type: bool
      optional: true
      default: false
    ask_limit_on_launch:
      type: bool
      optional: true
      default: false
    ask_tags_on_launch:
      type: bool
      optional: true
      default: false
    ask_skip_tags_on_launch:
      type: bool
      optional: true
      default: false
    ask_job_type_on_launch:
      type: bool
      optional: true
      default: false
    ask_verbosity_on_launch:
      type: bool
      optional: true
      default: false
    ask_inventory_on_launch:
      type: bool
      optional: true
      default: false
    ask_credential_on_launch:
      type: bool
      optional: true
      default: false
    ask_execution_environment_on_launch:
      type: bool
      optional: true
      default: false
    ask_labels_on_launch:
      type: bool
      optional: true
      default: false
    ask_forks_on_launch:
      type: bool
      optional: true
      default: false
    ask_job_slice_count_on_launch:
      type: bool
      optional: true
      default: false
    ask_timeout_on_launch:
      type: bool
      optional: true
      default: false
    ask_instance_groups_on_launch:
      type: bool
      optional: true
      default: false
    survey_enabled:
      type: bool
      optional: true
      default: false
    become_enabled:
      type: bool
      optional: true
      default: false
    diff_mode:
      type: bool
      optional: true
      default: false
    allow_simultaneous:
      type: bool
      optional: true
      default: false
    job_slice_count:
      type: number
      optional: true
      default: 1
    webhook_service:
      type: string
      optional: true
      computed: true
    webhook_credential:
      type: number
      optional: true
    execution_environment:
      type: number
      optional: true
    prevent_instance_group_fallback:
      type: bool
      optional: true
      default: false

conformance:
  example:
    name: "tf-jt-test-01"
    job_type: "run"
    inventory: 177
    project: 159
    playbook: "hello_world.yml"
    description: ""
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    extra_vars: ""
