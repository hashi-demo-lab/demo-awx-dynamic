apiVersion: agentprovider/v1

type: awx_host
kind: Resource

connection:
    base_url: ${env.AWX}
    allow_insecure: true
    allow_private_host: true
    headers:
        Content-Type: application/json
    auth:
        type: basic
        username: ${env.AWX_USERNAME}
        password: ${env.AWX_PASSWORD}

identity:
    attribute: id
    known_after: create
    response_field: id

schema:
    attributes:
        id:
            computed: true
            type: string
        name:
            required: true
            type: string
        description:
            optional: true
            default: ""
            type: string
        inventory:
            required: true
            type: number
        enabled:
            optional: true
            default: true
            type: bool
        instance_id:
            optional: true
            default: ""
            type: string
        variables:
            optional: true
            default: ""
            type: string

lifecycle:
    create:
        method: POST
        path: /api/v2/hosts/
        expect_status:
            - 201
        body:
            - name
            - description
            - inventory
            - enabled
            - instance_id
            - variables
    read:
        method: GET
        path: "/api/v2/hosts/${id}/"
        expect_status:
            - 200
        not_found_status:
            - 404
    update:
        method: PATCH
        path: "/api/v2/hosts/${id}/"
        expect_status:
            - 200
        refresh_after: true
        body:
            - name
            - description
            - inventory
            - enabled
            - instance_id
            - variables
    delete:
        method: DELETE
        path: "/api/v2/hosts/${id}/"
        expect_status:
            - 204
        not_found_status:
            - 404

ignore_server_fields:
    - type
    - url
    - related
    - summary_fields
    - created
    - modified
    - has_active_failures
    - has_inventory_sources
    - last_job
    - last_job_host_summary
    - ansible_facts_modified
    - detail

conformance:
    example:
        name: apeval-fresh-host-x7k2
        description: ""
        inventory: 154
        enabled: true
        instance_id: ""
        variables: ""
    update_to:
        name: apeval-fresh-host-x7k2
        description: "updated description"
        inventory: 154
        enabled: false
        instance_id: ""
        variables: ""
    expect:
        id:
            not_null: true
    invariants:
        - id_is_computed_and_nonempty
        - create_echoes_inputs
        - optional_default_consistency
        - read_matches_create
        - update_then_read_reflects
        - second_apply_is_noop
        - delete_then_read_404
        - state_matches_expect
        - import_reconstructs
        - id_stable_across_update
