apiVersion: agentprovider/v1
kind: Resource
type: awx_host
connection:
    base_url: ${env.AWX}
    allow_insecure: true
    allow_private_host: true
    headers:
        Content-Type: application/json
        Accept: application/json
    auth:
        type: basic
        username: ${env.AWX_USERNAME}
        password: ${env.AWX_PASSWORD}
        failure_status: [401, 403]
identity:
    attribute: id
    known_after: create
    response_field: id
schema:
    attributes:
        id: { computed: true, type: string }
        name: { required: true, type: string }
        description: { optional: true, computed: true, type: string }
        inventory: { required: true, type: number }
        enabled: { optional: true, computed: true, type: bool }
        instance_id: { optional: true, computed: true, type: string }
        variables: { optional: true, computed: true, type: string }
lifecycle:
    create:
        method: POST
        path: /api/v2/hosts/
        body: [name, description, inventory, enabled, instance_id, variables]
        expect_status: [200, 201]
    read:
        method: GET
        path: /api/v2/hosts/${id}/
        expect_status: [200]
        not_found_status: [404]
    update:
        method: PATCH
        path: /api/v2/hosts/${id}/
        body: [name, description, inventory, enabled, instance_id, variables]
        expect_status: [200]
        refresh_after: true
    delete:
        method: DELETE
        path: /api/v2/hosts/${id}/
        expect_status: [200, 202, 204]
        not_found_status: [404]
ignore_server_fields:
    - type
    - url
    - related
    - summary_fields
    - created
    - modified
    - has_active_failures
    - has_inventory_sources
    - last_job
    - last_job_host_summary
    - ansible_facts_modified
    - detail
conformance:
    example:
        name: apeval-r11-host
        description: agentprovider eval r11 host
        inventory: 117
        enabled: true
        instance_id: ""
        variables: ""
    update_to:
        name: apeval-r11-host
        description: agentprovider eval r11 host updated
        inventory: 117
        enabled: false
        instance_id: ""
        variables: ""
    expect:
        id: { not_null: true }
    invariants:
        - id_is_computed_and_nonempty
        - create_echoes_inputs
        - optional_default_consistency
        - read_matches_create
        - update_then_read_reflects
        - second_apply_is_noop
        - delete_then_read_404
        - state_matches_expect
        - import_reconstructs
        - id_stable_across_update
