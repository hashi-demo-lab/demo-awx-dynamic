apiVersion: agentprovider/v1
kind: DataSource
type: organization

connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}

schema:
  attributes:
    id:
      type: string
      required: true
    name:
      type: string
      computed: true
    description:
      type: string
      computed: true
    max_hosts:
      type: number
      computed: true
    default_environment:
      type: string
      computed: true

lifecycle:
  read:
    method: GET
    path: "/api/v2/organizations/${id}/"
    expect_status: [200]
    not_found_status: [404]

ignore_server_fields:
  - related
  - summary_fields
  - url
  - type
  - created
  - modified
  - custom_virtualenv

conformance:
  example:
    id: "147"
    name: ap-org-178012357044486
  invariants:
    - read_returns_expected
