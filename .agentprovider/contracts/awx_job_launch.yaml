apiVersion: agentprovider/v1
kind: Resource
type: awx_job

connection:
    base_url: ${env.AWX}
    allow_insecure: true
    allow_private_host: true
    headers:
        Content-Type: application/json
    auth:
        type: basic
        username: ${env.AWX_USERNAME}
        password: ${env.AWX_PASSWORD}

actions:
    launch:
        method: POST
        path: /api/v2/job_templates/${template_id}/launch/
        expect_status:
            - 201

schema:
    attributes:
        template_id:
            type: number
            required: true
            field: template_id
        id:
            computed: true
            type: number
        job:
            computed: true
            type: number
        status:
            computed: true
            type: string
        job_type:
            computed: true
            type: string
        name:
            computed: true
            type: string
        type:
            computed: true
            type: string

ignore_server_fields:
    - related
    - summary_fields
    - url
    - created
    - modified
    - launched_by
    - job_args
    - job_cwd
    - job_env
    - job_explanation
    - result_traceback
    - event_processing_finished
    - canceled_on
    - started
    - finished
    - elapsed
    - artifacts
    - passwords_needed_to_start
    - allow_simultaneous
    - description
    - unified_job_template
    - organization
    - project
    - inventory
    - playbook
    - scm_branch
    - scm_revision
    - forks
    - limit
    - verbosity
    - job_tags
    - skip_tags
    - start_at_task
    - diff_mode
    - force_handlers
    - execution_environment
    - execution_node
    - controller_node
    - instance_group
    - job_slice_count
    - job_slice_number
    - timeout
    - extra_vars
    - launch_type
    - job_template
    - use_fact_cache
    - failed
    - webhook_service
    - webhook_credential
    - webhook_guid
    - ignored_fields
    - work_unit_id

conformance:
    action: launch
    example:
        template_id: 70
        status: pending
        job_type: run
        name: ap-demo-jt-05290835
        type: job
    expect:
        id:
            not_null: true
        job:
            not_null: true
    invariants:
        - action_returns_expected
        - state_matches_expect
