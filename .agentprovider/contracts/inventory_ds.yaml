apiVersion: agentprovider/v1
kind: DataSource
type: inventory

connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}

identity:
  attribute: id
  response_field: id

lifecycle:
  read:
    method: GET
    path: "/api/v2/inventories/${id}/"
    expect_status:
      - 200
    not_found_status:
      - 404

schema:
  attributes:
    id:
      type: number
      required: true
    name:
      type: string
      computed: true
    description:
      type: string
      computed: true
    organization:
      type: number
      computed: true
    kind:
      type: string
      computed: true
    host_filter:
      type: string
      computed: true
      optional: true
    variables:
      type: string
      computed: true
    prevent_instance_group_fallback:
      type: bool
      computed: true
    has_active_failures:
      type: bool
      computed: true
    total_hosts:
      type: number
      computed: true
    hosts_with_active_failures:
      type: number
      computed: true
    total_groups:
      type: number
      computed: true
    has_inventory_sources:
      type: bool
      computed: true
    total_inventory_sources:
      type: number
      computed: true
    inventory_sources_with_failures:
      type: number
      computed: true
    pending_deletion:
      type: bool
      computed: true

ignore_server_fields:
  - related
  - summary_fields
  - url
  - type
  - created
  - modified

conformance:
  example:
    id: 183
    name: "ap-inv-178012362345216"
    organization: 149
  invariants:
    - read_returns_expected
