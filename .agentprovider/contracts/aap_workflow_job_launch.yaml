apiVersion: agentprovider/v1
kind: Resource
type: aap_workflow_job
connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  headers:
    Content-Type: application/json
  auth:
    type: basic
    username: "${env.AWX_USERNAME}"
    password: "${env.AWX_PASSWORD}"
schema:
  attributes:
    workflow_template_id: { type: number, required: true }
    workflow_job_id:      { type: number, computed: true, field: id }
    status:               { type: string, computed: true }
    name:                 { type: string, computed: true }
actions:
  launch:
    method: POST
    path: /api/v2/workflow_job_templates/${workflow_template_id}/launch/
    expect_status: [201]
conformance:
  action: launch
  example:
    workflow_template_id: 56
    status: pending
    name: tf-demo-wfjt-fixture
  expect:
    workflow_job_id: { not_null: true }
  invariants:
    - action_returns_expected
    - state_matches_expect
