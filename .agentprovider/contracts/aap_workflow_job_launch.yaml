apiVersion: agentprovider/v1
type: aap_workflow_job
kind: Resource

connection:
    base_url: ${env.AWX}
    allow_insecure: true
    allow_private_host: true
    headers:
        Content-Type: application/json
    auth:
        type: basic
        username: ${env.AWX_USERNAME}
        password: ${env.AWX_PASSWORD}

schema:
    attributes:
        workflow_template_id:
            type: number
            required: true
        workflow_job:
            computed: true
            type: number
        status:
            computed: true
            type: string
        name:
            computed: true
            type: string
        launch_type:
            computed: true
            type: string
        failed:
            computed: true
            type: bool
        extra_vars:
            computed: true
            type: string

actions:
    launch:
        method: POST
        path: "/api/v2/workflow_job_templates/${workflow_template_id}/launch/"
        expect_status:
            - 201

conformance:
    action: launch
    example:
        workflow_template_id: 56
        status: "pending"
        name: "tf-demo-wfjt-fixture"
        launch_type: "manual"
        failed: false
        extra_vars: "{}"
    expect:
        workflow_job:
            not_null: true
    invariants:
        - action_returns_expected
        - state_matches_expect
