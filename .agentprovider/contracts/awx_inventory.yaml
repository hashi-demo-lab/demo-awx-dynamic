apiVersion: agentprovider/v1
kind: Resource
type: awx_inventory
connection:
  base_url: ${env.AWX}
  allow_insecure: true
  allow_private_host: true
  headers:
    Accept: application/json
    Content-Type: application/json
  auth:
    type: basic
    username: ${env.AWX_USERNAME}
    password: ${env.AWX_PASSWORD}
    failure_status: [401, 403]
schema:
  attributes:
    id:
      type: string
      computed: true
    name:
      type: string
      required: true
    organization:
      type: number
      required: true
    description:
      type: string
      optional: true
      computed: true
    kind:
      type: string
      optional: true
      computed: true
    host_filter:
      type: string
      optional: true
    variables:
      type: string
      optional: true
      computed: true
    prevent_instance_group_fallback:
      type: bool
      optional: true
      computed: true
identity:
  attribute: id
  known_after: create
ignore_server_fields:
  - type
  - url
  - related
  - summary_fields
  - created
  - modified
  - has_active_failures
  - total_hosts
  - hosts_with_active_failures
  - total_groups
  - has_inventory_sources
  - total_inventory_sources
  - inventory_sources_with_failures
  - pending_deletion
  - detail
lifecycle:
  create:
    method: POST
    path: /api/v2/inventories/
    body: [name, description, organization, kind, host_filter, variables, prevent_instance_group_fallback]
    expect_status: [201]
  read:
    method: GET
    path: /api/v2/inventories/${id}/
    expect_status: [200]
    not_found_status: [404]
  update:
    method: PATCH
    path: /api/v2/inventories/${id}/
    body: [name, description, organization, kind, host_filter, variables, prevent_instance_group_fallback]
    expect_status: [200]
    refresh_after: true
  delete:
    method: DELETE
    path: /api/v2/inventories/${id}/
    expect_status: [202, 204]
    not_found_status: [404]
conformance:
  example:
    name: apeval-r10-inv
    description: agentprovider eval r10 inventory
    organization: 1
    kind: ""
    host_filter: null
    variables: ""
    prevent_instance_group_fallback: false
  update_to:
    name: apeval-r10-inv
    description: agentprovider eval r10 inventory updated
    organization: 1
    kind: ""
    host_filter: null
    variables: ""
    prevent_instance_group_fallback: true
  expect:
    id: { not_null: true }
  invariants:
    - id_is_computed_and_nonempty
    - create_echoes_inputs
    - optional_default_consistency
    - read_matches_create
    - update_then_read_reflects
    - second_apply_is_noop
    - delete_then_read_404
    - state_matches_expect
    - import_reconstructs
    - id_stable_across_update
